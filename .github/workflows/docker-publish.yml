name: Docker Compose Build

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '41 17 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}-backend
  IMAGE_FRONTEND: ${{ github.repository }}-frontend

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3.5.0
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and tag Docker Compose services
        run: |
          docker-compose -f docker-compose.yml build

      - name: Tag and optionally push images
        if: github.event_name != 'pull_request'
        run: |
          docker tag fastapi-backend $REGISTRY/${{ env.IMAGE_BACKEND }}:latest
          docker tag react-frontend $REGISTRY/${{ env.IMAGE_FRONTEND }}:latest
          
          docker push $REGISTRY/${{ env.IMAGE_BACKEND }}:latest
          docker push $REGISTRY/${{ env.IMAGE_FRONTEND }}:latest

      - name: Sign Docker images
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes $REGISTRY/${{ env.IMAGE_BACKEND }}:latest
          cosign sign --yes $REGISTRY/${{ env.IMAGE_FRONTEND }}:latest
